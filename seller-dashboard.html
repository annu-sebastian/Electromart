<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seller Dashboard — ElectroMart</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

:root {
  --primary: #0a66ff;
  --accent: #0d47a1;
  --muted: #6b7280;
  --bg: #f4f7fb;
  --card: #ffffff;
  --shadow: 0 6px 20px rgba(13,71,161,0.08);
  --radius: 12px;
  --text: #111;
  --success: #4CAF50;
  --danger: #f44336;
}

[data-theme="dark"] {
  --primary: #3b82f6;
  --accent: #2563eb;
  --muted: #9ca3af;
  --bg: #0f172a;
  --card: #1e293b;
  --shadow: 0 6px 20px rgba(0,0,0,0.3);
  --text: #f1f5f9;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'Poppins', sans-serif; 
  background: var(--bg); 
  color: var(--text);
  line-height: 1.6;
  transition: background-color 0.3s ease, color 0.3s ease;
}

/* Navbar */
.navbar {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: #fff;
  padding: 1rem 0;
  box-shadow: 0 4px 14px rgba(2,6,23,0.15);
  position: sticky;
  top: 0;
  z-index: 1000;
}

.nav-container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.brand {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  color: #fff;
  font-weight: 700;
  font-size: 1.5rem;
  text-decoration: none;
}

.logo {
  width: 45px;
  height: 45px;
  border-radius: 10px;
  background: #fff;
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 1.5rem;
}

.nav-actions {
  display: flex;
  gap: 1rem;
  align-items: center;
}

.nav-btn {
  padding: 0.6rem 1.2rem;
  border: 2px solid rgba(255,255,255,0.3);
  background: transparent;
  color: #fff;
  border-radius: 20px;
  cursor: pointer;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.3s;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
}

.nav-btn:hover {
  background: rgba(255,255,255,0.15);
  border-color: #fff;
}

.theme-toggle {
  background: transparent;
  border: 2px solid rgba(255,255,255,0.5);
  color: #fff;
  padding: 0.5rem 0.75rem;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1.2rem;
  transition: all 0.3s;
}

.theme-toggle:hover {
  background: rgba(255,255,255,0.15);
  border-color: #fff;
}

/* Container */
.container {
  max-width: 1400px;
  margin: 2rem auto;
  padding: 0 1.5rem;
}

/* Dashboard Header */
.dashboard-header {
  background: var(--card);
  padding: 2rem;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 2rem;
}

.dashboard-header h1 {
  color: var(--accent);
  margin-bottom: 0.5rem;
  font-size: 2rem;
}

.dashboard-header p {
  color: var(--muted);
}

/* Stats Cards */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 1.5rem;
  margin-bottom: 2rem;
}

.stat-card {
  background: var(--card);
  padding: 1.5rem;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 1rem;
}

.stat-icon {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  color: #fff;
}

.stat-icon.primary { background: linear-gradient(135deg, var(--primary), var(--accent)); }
.stat-icon.success { background: linear-gradient(135deg, #4CAF50, #45a049); }
.stat-icon.warning { background: linear-gradient(135deg, #ff9800, #f57c00); }
.stat-icon.danger { background: linear-gradient(135deg, #f44336, #da190b); }

.stat-info h3 {
  color: var(--text);
  font-size: 1.8rem;
  margin-bottom: 0.25rem;
}

.stat-info p {
  color: var(--muted);
  font-size: 0.9rem;
}

/* Main Grid */
.main-grid {
  display: grid;
  grid-template-columns: 400px 1fr;
  gap: 2rem;
  align-items: start;
}

/* Add Product Form */
.add-product-card {
  background: var(--card);
  padding: 2rem;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  position: sticky;
  top: 100px;
}

.add-product-card h2 {
  color: var(--accent);
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.form-group {
  margin-bottom: 1.25rem;
}

.form-group label {
  display: block;
  color: var(--text);
  font-weight: 600;
  margin-bottom: 0.5rem;
  font-size: 0.9rem;
}

.form-control {
  width: 100%;
  padding: 0.75rem;
  border: 2px solid #e6eefc;
  border-radius: 8px;
  outline: none;
  font-size: 0.95rem;
  transition: border 0.3s;
  background: var(--bg);
  color: var(--text);
  font-family: 'Poppins', sans-serif;
}

.form-control:focus {
  border-color: var(--primary);
}

textarea.form-control {
  resize: vertical;
  min-height: 80px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}

.add-btn {
  width: 100%;
  padding: 0.85rem;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}

.add-btn:hover {
  background: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(10,102,255,0.3);
}

/* Products List */
.products-card {
  background: var(--card);
  padding: 2rem;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.products-card h2 {
  color: var(--accent);
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.products-table {
  width: 100%;
  border-collapse: collapse;
}

.products-table thead {
  background: var(--bg);
}

.products-table th {
  padding: 1rem;
  text-align: left;
  font-weight: 600;
  color: var(--text);
  border-bottom: 2px solid #e6eefc;
}

.products-table td {
  padding: 1rem;
  border-bottom: 1px solid #e6eefc;
  color: var(--text);
}

.product-img {
  width: 60px;
  height: 60px;
  object-fit: cover;
  border-radius: 8px;
}

.product-actions {
  display: flex;
  gap: 0.5rem;
}

.btn-icon {
  padding: 0.5rem 0.75rem;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.3s;
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
  font-size: 0.85rem;
  font-weight: 600;
}

.btn-edit {
  background: #2196F3;
  color: #fff;
}

.btn-edit:hover {
  background: #1976D2;
}

.btn-delete {
  background: var(--danger);
  color: #fff;
}

.btn-delete:hover {
  background: #da190b;
}

.no-products {
  text-align: center;
  padding: 3rem;
  color: var(--muted);
}

.no-products i {
  font-size: 4rem;
  margin-bottom: 1rem;
  opacity: 0.3;
}

/* Responsive */
@media (max-width: 1200px) {
  .main-grid {
    grid-template-columns: 1fr;
  }
  
  .add-product-card {
    position: static;
  }
}

@media (max-width: 768px) {
  .products-table {
    font-size: 0.85rem;
  }
  
  .products-table th,
  .products-table td {
    padding: 0.75rem 0.5rem;
  }
  
  .product-img {
    width: 50px;
    height: 50px;
  }
}

@keyframes slideIn {
  from { transform: translateX(400px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

@keyframes slideOut {
  from { transform: translateX(0); opacity: 1; }
  to { transform: translateX(400px); opacity: 0; }
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="brand">
      <div class="logo">E</div>
      ElectroMart Seller
    </a>
    
    <div class="nav-actions">
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
        <i class="fas fa-moon" id="themeIcon"></i>
      </button>
      <a href="index.html" class="nav-btn">
        <i class="fas fa-store"></i>
        View Store
      </a>
      <a href="index.html" class="nav-btn">
        <i class="fas fa-sign-out-alt"></i>
        Logout
      </a>
    </div>
  </div>
</nav>

<!-- Container -->
<div class="container">
  
  <!-- Dashboard Header -->
  <div class="dashboard-header">
    <h1><i class="fas fa-tachometer-alt"></i> Seller Dashboard</h1>
    <p>Manage your products and track your sales</p>
  </div>
  
  <!-- Stats Grid -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon primary">
        <i class="fas fa-boxes"></i>
      </div>
      <div class="stat-info">
        <h3 id="totalProducts">0</h3>
        <p>Total Products</p>
      </div>
    </div>
    
    <div class="stat-card">
      <div class="stat-icon success">
        <i class="fas fa-check-circle"></i>
      </div>
      <div class="stat-info">
        <h3 id="activeProducts">0</h3>
        <p>Active Products</p>
      </div>
    </div>
    
    <div class="stat-card">
      <div class="stat-icon warning">
        <i class="fas fa-shopping-cart"></i>
      </div>
      <div class="stat-info">
        <h3>248</h3>
        <p>Total Orders</p>
      </div>
    </div>
    
    <div class="stat-card">
      <div class="stat-icon danger">
        <i class="fas fa-rupee-sign"></i>
      </div>
      <div class="stat-info">
        <h3>₹1.2L</h3>
        <p>Total Revenue</p>
      </div>
    </div>
  </div>
  
  <!-- Main Grid -->
  <div class="main-grid">
    
    <!-- Add Product Form -->
    <div class="add-product-card">
      <h2><i class="fas fa-plus-circle"></i> Add New Product</h2>
      
      <form id="addProductForm" onsubmit="addProduct(event)">
        <div class="form-group">
          <label for="productTitle">Product Title *</label>
          <input 
            type="text" 
            id="productTitle" 
            class="form-control" 
            placeholder="e.g., iPhone 14 Pro Max"
            required
          >
        </div>
        
        <div class="form-group">
          <label for="productCategory">Category *</label>
          <select id="productCategory" class="form-control" required>
            <option value="">Select Category</option>
            <option value="Mobiles">Mobiles</option>
            <option value="Laptops">Laptops</option>
            <option value="Headphones">Headphones</option>
            <option value="Tablets">Tablets</option>
            <option value="Smartwatches">Smartwatches</option>
            <option value="Accessories">Accessories</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="productBrand">Brand *</label>
          <input 
            type="text" 
            id="productBrand" 
            class="form-control" 
            placeholder="e.g., Apple"
            required
          >
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="productPrice">Price (₹) *</label>
            <input 
              type="number" 
              id="productPrice" 
              class="form-control" 
              placeholder="0"
              min="1"
              required
            >
          </div>
          
          <div class="form-group">
            <label for="productStock">Stock *</label>
            <input 
              type="number" 
              id="productStock" 
              class="form-control" 
              placeholder="0"
              min="0"
              required
            >
          </div>
        </div>
        
        <div class="form-group">
          <label for="productImage">Image URL *</label>
          <input 
            type="url" 
            id="productImage" 
            class="form-control" 
            placeholder="https://example.com/image.jpg"
            required
          >
        </div>
        
        <div class="form-group">
          <label for="productDescription">Description</label>
          <textarea 
            id="productDescription" 
            class="form-control" 
            placeholder="Product description..."
          ></textarea>
        </div>
        
        <button type="submit" class="add-btn">
          <i class="fas fa-plus"></i>
          Add Product
        </button>
      </form>
    </div>
    
    <!-- Products List -->
    <div class="products-card">
      <h2><i class="fas fa-list"></i> My Products</h2>
      
      <div id="productsContainer">
        <table class="products-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Title</th>
              <th>Category</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsTableBody">
            <!-- Products will be loaded here -->
          </tbody>
        </table>
      </div>
    </div>
    
  </div>
</div>

<script>
// Initialize
let sellerProducts = [];
let editingProductId = null;

document.addEventListener('DOMContentLoaded', function() {
  loadTheme();
  loadProducts();
  updateStats();
});

// Theme management
function loadTheme() {
  const theme = window.currentTheme || 'light';
  document.documentElement.setAttribute('data-theme', theme);
  updateThemeIcon(theme);
}

function toggleTheme() {
  const currentTheme = window.currentTheme || 'light';
  const newTheme = currentTheme === 'light' ? 'dark' : 'light';
  window.currentTheme = newTheme;
  document.documentElement.setAttribute('data-theme', newTheme);
  updateThemeIcon(newTheme);
}

function updateThemeIcon(theme) {
  const icon = document.getElementById('themeIcon');
  if (icon) {
    icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
  }
}

// Add Product
function addProduct(event) {
  event.preventDefault();
  
  const title = document.getElementById('productTitle').value.trim();
  const category = document.getElementById('productCategory').value;
  const brand = document.getElementById('productBrand').value.trim();
  const price = parseFloat(document.getElementById('productPrice').value);
  const stock = parseInt(document.getElementById('productStock').value);
  const image = document.getElementById('productImage').value.trim();
  const description = document.getElementById('productDescription').value.trim();
  
  if (!title || !category || !brand || !price || !image) {
    showNotification('Please fill all required fields', 'error');
    return;
  }
  
  if (editingProductId) {
    // Update existing product
    const index = sellerProducts.findIndex(p => p.id === editingProductId);
    if (index !== -1) {
      sellerProducts[index] = {
        ...sellerProducts[index],
        title,
        category,
        brand,
        price,
        stock,
        image,
        description
      };
      showNotification('Product updated successfully!', 'success');
      editingProductId = null;
    }
  } else {
    // Add new product
    const newProduct = {
      id: Date.now(),
      title,
      category,
      brand,
      price,
      stock,
      image,
      description,
      rating: 4.5,
      addedAt: new Date().toISOString()
    };
    
    sellerProducts.push(newProduct);
    showNotification('Product added successfully!', 'success');
  }
  
  // Reset form
  document.getElementById('addProductForm').reset();
  
  // Update display
  loadProducts();
  updateStats();
}

// Load Products
function loadProducts() {
  const tbody = document.getElementById('productsTableBody');
  
  if (sellerProducts.length === 0) {
    tbody.innerHTML = `
      <tr>
        <td colspan="6" class="no-products">
          <i class="fas fa-box-open"></i>
          <h3>No products yet</h3>
          <p>Add your first product to get started!</p>
        </td>
      </tr>
    `;
    return;
  }
  
  tbody.innerHTML = sellerProducts.map(product => `
    <tr>
      <td><img src="${product.image}" alt="${product.title}" class="product-img"></td>
      <td><strong>${product.title}</strong><br><small>${product.brand}</small></td>
      <td>${product.category}</td>
      <td><strong>₹${product.price.toLocaleString('en-IN')}</strong></td>
      <td>${product.stock > 0 ? `<span style="color: var(--success)">${product.stock} in stock</span>` : '<span style="color: var(--danger)">Out of stock</span>'}</td>
      <td class="product-actions">
        <button class="btn-icon btn-edit" onclick="editProduct(${product.id})">
          <i class="fas fa-edit"></i> Edit
        </button>
        <button class="btn-icon btn-delete" onclick="deleteProduct(${product.id})">
          <i class="fas fa-trash"></i> Delete
        </button>
      </td>
    </tr>
  `).join('');
}

// Edit Product
function editProduct(id) {
  const product = sellerProducts.find(p => p.id === id);
  if (!product) return;
  
  editingProductId = id;
  
  document.getElementById('productTitle').value = product.title;
  document.getElementById('productCategory').value = product.category;
  document.getElementById('productBrand').value = product.brand;
  document.getElementById('productPrice').value = product.price;
  document.getElementById('productStock').value = product.stock;
  document.getElementById('productImage').value = product.image;
  document.getElementById('productDescription').value = product.description || '';
  
  // Scroll to form
  document.querySelector('.add-product-card').scrollIntoView({ behavior: 'smooth' });
  
  showNotification('Editing product...', 'success');
}

// Delete Product
function deleteProduct(id) {
  if (!confirm('Are you sure you want to delete this product?')) return;
  
  sellerProducts = sellerProducts.filter(p => p.id !== id);
  loadProducts();
  updateStats();
  showNotification('Product deleted successfully!', 'success');
}

// Update Stats
function updateStats() {
  const total = sellerProducts.length;
  const active = sellerProducts.filter(p => p.stock > 0).length;
  
  document.getElementById('totalProducts').textContent = total;
  document.getElementById('activeProducts').textContent = active;
}


// Show notification
function showNotification(message, type = 'success') {
  const notification = document.createElement('div');
  notification.textContent = message;
  notification.style.cssText = `
    position: fixed;
    top: 100px;
    right: 20px;
    background: ${type === 'success' ? 'linear-gradient(135deg, #4CAF50, #45a049)' : 'linear-gradient(135deg, #f44336, #da190b)'};
    color: white;
    padding: 1rem 1.5rem;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    z-index: 10000;
    animation: slideIn 0.3s ease;
    font-weight: 600;
    max-width: 350px;
  `;
  
  document.body.appendChild(notification);
  
  setTimeout(() => {
    notification.style.animation = 'slideOut 0.3s ease';
    setTimeout(() => notification.remove(), 300);
  }, 3000);
}
</script>

</body>
</html>
