<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contact — ElectroMart</title><link rel="stylesheet" href="assets/css/style.css"></head>
<body>
  <nav class="navbar"><div class="nav-inner"><div class="brand"><div class="logo">E</div>ElectroMart</div></div></nav>
  <main class="container" style="margin-top:24px">
    <div class="hero-card">
      <h2>Contact Us</h2>
      <p style="color:var(--muted)">For inquiries, please email <strong>support@electromart.example</strong></p>
      <form style="margin-top:12px" onsubmit="event.preventDefault();alert('Message sent (demo)')">
        <input class="form-control" placeholder="Your name" required>
        <input class="form-control" placeholder="Your email" type="email" required>
        <textarea class="form-control" placeholder="Message" rows="5" required></textarea>
        <button class="add-btn">Send Message</button>
      </form>
    </div>
  </main>
  <footer class="footer">© 2025 ElectroMart — Demo marketplace</footer>
  <script src="assets/js/main.js"></script>
</body>
</html>
