<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Seller Register — ElectroMart</title><link rel="stylesheet" href="assets/css/style.css"></head>
<body>
  <main class="container">
    <div class="center-card">
      <h3>Seller Registration</h3>
      <form onsubmit="event.preventDefault(); alert('Seller registered (demo)')">
        <input class="form-control" placeholder="Shop/Name" required>
        <input class="form-control" placeholder="Email" type="email" required>
        <input class="form-control" placeholder="Password" type="password" required>
        <button class="add-btn" style="width:100%">Register</button>
      </form>
    </div>
  </main>
  <script src="assets/js/main.js"></script>
</body>
</html>
