<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cart — ElectroMart</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <div class="brand"><div class="logo">E</div>ElectroMart</div>
      <div class="searchbar" style="display:none"></div>
      <div class="nav-actions">
        <button class="icon-btn" onclick="location.href='index.html'">Continue shopping</button>
        <button class="icon-btn" onclick="location.href='login.html'">Login</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <h2 style="margin-top:24px">Your cart</h2>
    <div style="display:grid;grid-template-columns:1fr 360px;gap:20px;margin-top:12px">
      <div class="card-sm">
        <table class="cart-table">
          <thead><tr><th>Product</th><th>Price</th><th>Qty</th><th>Action</th></tr></thead>
          <tbody id="cartItems"></tbody>
        </table>
      </div>
      <aside class="summary-card">
        <h4>Order summary</h4>
        <div style="margin-top:12px">Total: <strong>₹<span id="cartTotal">0</span></strong></div>
        <div style="margin-top:12px"><button onclick="location.href='checkout.html'" class="add-btn" style="width:100%">Proceed to Checkout</button></div>
      </aside>
    </div>
  </main>

  <footer class="footer">© 2025 ElectroMart — Demo marketplace</footer>

  <script src="assets/js/products-data.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    function renderCart(){
      const cart = getCart();
      const tbody = document.getElementById('cartItems');
      tbody.innerHTML = '';
      let total = 0;
      cart.forEach((c, idx)=>{
        total += c.price * c.qty;
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${c.title}</td><td>₹${c.price}</td><td><input class="qty-input" value="${c.qty}" min="1" onchange="changeQty(${idx}, this.value)"></td><td><button class="add-btn" style="background:#e53935" onclick="removeItem(${idx})">Remove</button></td>`;
        tbody.appendChild(tr);
      });
      document.getElementById('cartTotal').textContent = total.toFixed(2);
      updateCartCount();
    }
    function changeQty(i,v){ const cart=getCart(); cart[i].qty=Number(v); saveCart(cart); renderCart(); }
    function removeItem(i){ const cart=getCart(); cart.splice(i,1); saveCart(cart); renderCart(); }

    renderCart();
  </script>
</body>
</html>
