<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register — ElectroMart</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

:root {
  --primary:#ff910a ;
  --accent: #ff910a;
  --muted: #6b7280;
  --bg: #f4f7fb;
  --card: #ffffff;
  --shadow: 0 6px 20px rgba(13,71,161,0.08);
  --radius: 12px;
  --text: #111;
}

[data-theme="dark"] {
  --primary: #3b82f6;
  --accent: #2563eb;
  --muted: #9ca3af;
  --bg: #0f172a;
  --card: #1e293b;
  --shadow: 0 6px 20px rgba(0,0,0,0.3);
  --text: #f1f5f9;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  transition: background 0.3s ease;
}

.register-container {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  padding: 3rem;
  width: 100%;
  max-width: 450px;
  position: relative;
}

.theme-toggle-btn {
  position: absolute;
  top: 1rem;
  right: 1rem;
  background: var(--bg);
  border: none;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--primary);
  font-size: 1.2rem;
  transition: all 0.3s;
}

.theme-toggle-btn:hover {
  transform: scale(1.1);
  background: var(--primary);
  color: #fff;
}

.logo-section {
  text-align: center;
  margin-bottom: 2rem;
}

.logo {
  width: 70px;
  height: 70px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 1rem;
  color: #fff;
  font-size: 2rem;
  font-weight: 700;
}

.logo-section h2 {
  color: var(--text);
  font-size: 1.8rem;
  margin-bottom: 0.5rem;
}

.logo-section p {
  color: var(--muted);
  font-size: 0.95rem;
}

.form-group {
  margin-bottom: 1.5rem;
}

.form-group label {
  display: block;
  color: var(--text);
  font-weight: 600;
  margin-bottom: 0.5rem;
  font-size: 0.9rem;
}

.input-wrapper {
  position: relative;
}

.input-icon {
  position: absolute;
  left: 1rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
}

.form-control {
  width: 100%;
  padding: 1rem 1rem 1rem 3rem;
  border: 2px solid #e6eefc;
  border-radius: 10px;
  outline: none;
  font-size: 1rem;
  transition: all 0.3s;
  background: var(--bg);
  color: var(--text);
}

.form-control:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(10,102,255,0.1);
}

.password-toggle {
  position: absolute;
  right: 1rem;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 0.5rem;
  transition: color 0.3s;
}

.password-toggle:hover {
  color: var(--primary);
}

.password-strength {
  margin-top: 0.5rem;
  font-size: 0.85rem;
}

.strength-bar {
  height: 4px;
  background: #e6eefc;
  border-radius: 2px;
  margin-top: 0.25rem;
  overflow: hidden;
}

.strength-bar-fill {
  height: 100%;
  transition: all 0.3s;
  border-radius: 2px;
}

.strength-weak { background: #f44336; width: 33%; }
.strength-medium { background: #ff9800; width: 66%; }
.strength-strong { background: #4CAF50; width: 100%; }

.terms {
  display: flex;
  align-items: start;
  gap: 0.75rem;
  margin-bottom: 1.5rem;
}

.terms input[type="checkbox"] {
  margin-top: 0.25rem;
  cursor: pointer;
  width: 18px;
  height: 18px;
}

.terms label {
  color: var(--text);
  font-size: 0.9rem;
  cursor: pointer;
}

.terms a {
  color: var(--primary);
  text-decoration: none;
}

.terms a:hover {
  text-decoration: underline;
}

.register-btn {
  width: 100%;
  padding: 1rem;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}

.register-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(10,102,255,0.3);
}

.register-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.register-btn:active:not(:disabled) {
  transform: translateY(0);
}

.divider {
  text-align: center;
  margin: 1.5rem 0;
  position: relative;
}

.divider::before,
.divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 40%;
  height: 1px;
  background: #e6eefc;
}

.divider::before { left: 0; }
.divider::after { right: 0; }

.divider span {
  background: var(--card);
  padding: 0 1rem;
  color: var(--muted);
  font-size: 0.9rem;
}

.login-link {
  text-align: center;
  color: var(--text);
  font-size: 0.95rem;
}

.login-link a {
  color: var(--primary);
  text-decoration: none;
  font-weight: 600;
}

.login-link a:hover {
  text-decoration: underline;
}

.back-home {
  text-align: center;
  margin-top: 1.5rem;
}

.back-home a {
  color: var(--muted);
  text-decoration: none;
  font-size: 0.9rem;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  transition: color 0.3s;
}

.back-home a:hover {
  color: var(--primary);
}

@keyframes slideIn {
  from { transform: translateX(400px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

@keyframes slideOut {
  from { transform: translateX(0); opacity: 1; }
  to { transform: translateX(400px); opacity: 0; }
}

@media (max-width: 640px) {
  .register-container {
    padding: 2rem 1.5rem;
  }
  .logo-section h2 {
    font-size: 1.5rem;
  }
}
</style>
</head>
<body>

<div class="register-container">
  <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme">
    <i class="fas fa-moon" id="themeIcon"></i>
  </button>
  
  <div class="logo-section">
    <div class="logo">E</div>
    <h2>Create Account</h2>
    <p>Join ElectroMart today</p>
  </div>
  
  <form id="registerForm" onsubmit="handleRegister(event)">
    <div class="form-group">
      <label for="fullname">Full Name</label>
      <div class="input-wrapper">
        <i class="fas fa-user input-icon"></i>
        <input 
          type="text" 
          id="fullname" 
          class="form-control" 
          placeholder="Enter your full name"
          required
          minlength="3"
        >
      </div>
    </div>
    
    <div class="form-group">
      <label for="email">Email Address</label>
      <div class="input-wrapper">
        <i class="fas fa-envelope input-icon"></i>
        <input 
          type="email" 
          id="email" 
          class="form-control" 
          placeholder="Enter your email"
          required
        >
      </div>
    </div>
    
    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrapper">
        <i class="fas fa-lock input-icon"></i>
        <input 
          type="password" 
          id="password" 
          class="form-control" 
          placeholder="Create a strong password"
          required
          minlength="6"
          oninput="checkPasswordStrength()"
        >
        <button type="button" class="password-toggle" onclick="togglePasswordField('password', 'toggleIcon1')">
          <i class="fas fa-eye" id="toggleIcon1"></i>
        </button>
      </div>
      <div class="password-strength" id="passwordStrength" style="display:none;">
        <div class="strength-bar">
          <div class="strength-bar-fill" id="strengthBar"></div>
        </div>
        <span id="strengthText"></span>
      </div>
    </div>
    
    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <div class="input-wrapper">
        <i class="fas fa-lock input-icon"></i>
        <input 
          type="password" 
          id="confirmPassword" 
          class="form-control" 
          placeholder="Re-enter your password"
          required
          minlength="6"
        >
        <button type="button" class="password-toggle" onclick="togglePasswordField('confirmPassword', 'toggleIcon2')">
          <i class="fas fa-eye" id="toggleIcon2"></i>
        </button>
      </div>
    </div>
    
    <div class="terms">
      <input type="checkbox" id="terms" required>
      <label for="terms">
        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
      </label>
    </div>
    
    <button type="submit" class="register-btn">
      <i class="fas fa-user-plus"></i>
      Create Account
    </button>
  </form>
  
  <div class="divider">
    <span>OR</span>
  </div>
  
  <div class="login-link">
    Already have an account? <a href="login.html">Login</a>
  </div>
  
  <div class="back-home">
    <a href="index.html">
      <i class="fas fa-arrow-left"></i>
      Back to Home
    </a>
  </div>
</div>

<script>
// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
  loadTheme();
});

// Theme management
function loadTheme() {
  const theme = window.currentTheme || 'light';
  document.documentElement.setAttribute('data-theme', theme);
  updateThemeIcon(theme);
}

function toggleTheme() {
  const currentTheme = window.currentTheme || 'light';
  const newTheme = currentTheme === 'light' ? 'dark' : 'light';
  window.currentTheme = newTheme;
  document.documentElement.setAttribute('data-theme', newTheme);
  updateThemeIcon(newTheme);
}

function updateThemeIcon(theme) {
  const icon = document.getElementById('themeIcon');
  if (icon) {
    icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
  }
}

// Password visibility toggle
function togglePasswordField(inputId, iconId) {
  const passwordInput = document.getElementById(inputId);
  const toggleIcon = document.getElementById(iconId);
  
  if (!passwordInput || !toggleIcon) return;
  
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    toggleIcon.className = 'fas fa-eye-slash';
  } else {
    passwordInput.type = 'password';
    toggleIcon.className = 'fas fa-eye';
  }
}

// Password strength checker
function checkPasswordStrength() {
  const password = document.getElementById('password').value;
  const strengthDiv = document.getElementById('passwordStrength');
  const strengthBar = document.getElementById('strengthBar');
  const strengthText = document.getElementById('strengthText');
  
  if (!strengthDiv || !strengthBar || !strengthText) return;
  
  if (password.length === 0) {
    strengthDiv.style.display = 'none';
    return;
  }
  
  strengthDiv.style.display = 'block';
  
  let strength = 0;
  
  if (password.length >= 8) strength++;
  if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
  if (password.match(/[0-9]/)) strength++;
  if (password.match(/[^a-zA-Z0-9]/)) strength++;
  
  strengthBar.className = 'strength-bar-fill';
  
  if (strength <= 1) {
    strengthBar.classList.add('strength-weak');
    strengthText.textContent = 'Weak password';
    strengthText.style.color = '#f44336';
  } else if (strength === 2 || strength === 3) {
    strengthBar.classList.add('strength-medium');
    strengthText.textContent = 'Medium password';
    strengthText.style.color = '#ff9800';
  } else {
    strengthBar.classList.add('strength-strong');
    strengthText.textContent = 'Strong password';
    strengthText.style.color = '#4CAF50';
  }
}

// Email validation
function isValidEmail(email) {
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return emailRegex.test(email);
}

// Handle registration
function handleRegister(event) {
  event.preventDefault();
  
  const fullname = document.getElementById('fullname').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const terms = document.getElementById('terms').checked;
  
  if (!fullname || !email || !password || !confirmPassword) {
    showNotification('Please fill in all fields', 'error');
    return;
  }
  
  if (fullname.length < 3) {
    showNotification('Name must be at least 3 characters', 'error');
    return;
  }
  
  if (!isValidEmail(email)) {
    showNotification('Please enter a valid email address', 'error');
    return;
  }
  
  if (password.length < 6) {
    showNotification('Password must be at least 6 characters', 'error');
    return;
  }
  
  if (password !== confirmPassword) {
    showNotification('Passwords do not match!', 'error');
    return;
  }
  
  if (!terms) {
    showNotification('Please accept the terms and conditions', 'error');
    return;
  }
  
  window.registeredUser = {
    fullname: fullname,
    email: email,
    registeredAt: new Date().toISOString()
  };
  
  showNotification('Account created successfully! Redirecting to login...', 'success');
  
  document.getElementById('registerForm').reset();
  
  setTimeout(() => {
    window.location.href = 'login.html';
  }, 2000);
}

// Show notification
function showNotification(message, type = 'success') {
  const notification = document.createElement('div');
  notification.textContent = message;
  notification.style.cssText = `
    position: fixed;
    top: 20px;
    right: 20px;
    background: ${type === 'success' ? 'linear-gradient(135deg, #4CAF50, #45a049)' : 'linear-gradient(135deg, #f44336, #da190b)'};
    color: white;
    padding: 1rem 1.5rem;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    z-index: 10000;
    animation: slideIn 0.3s ease;
    font-weight: 600;
    max-width: 350px;
  `;
  
  document.body.appendChild(notification);
  
  setTimeout(() => {
    notification.style.animation = 'slideOut 0.3s ease';
    setTimeout(() => notification.remove(), 300);
  }, 3000);
}
</script>

</body>
</html>
